name: Squawk 7500 Hijack Investigation
description: >-
  Alert-triggered investigation workflow for squawk 7500 (hijack) signals.
  Deduplicates via Kibana case management, enriches with flight history and
  external data (adsbdb aircraft/route, adsb.lol live position, Reuters news),
  invokes the hijack assessment agent for AI-powered false-positive analysis,
  and routes based on the verdict — Slack for genuine threats, auto-close for
  false positives.
enabled: true
tags: ["adsb", "squawk-7500", "hijack", "alert", "ai", "cases"]

consts:
  indexName: "demos-aircraft-adsb"
  historyWindow: "now-6h"

triggers:
  - type: alert
  - type: manual

steps:
  # ------------------------------------------------------------------
  # 1. Fetch the most recent squawk 7500 document
  # ------------------------------------------------------------------
  - name: fetch_squawk_event
    type: elasticsearch.request
    with:
      method: POST
      path: "/demos-aircraft-adsb/_search"
      body:
        query:
          bool:
            filter:
              - term:
                  squawk: "7500"
              - range:
                  "@timestamp":
                    gte: "now-10m"
        size: 1
        sort:
          - "@timestamp":
              order: desc

  # ------------------------------------------------------------------
  # 2. Deduplicate — look for an existing open case for this aircraft
  # ------------------------------------------------------------------
  - name: find_existing_case
    type: kibana.request
    with:
      method: GET
      path: "/api/cases/_find?tags=icao24:{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}&tags=squawk-7500&status=open&perPage=1"

  # ------------------------------------------------------------------
  # 3. Case management — add comment to existing or create new
  # ------------------------------------------------------------------
  - name: handle_case
    type: if
    condition: "{{ steps.find_existing_case.output.total > 0 }}"
    steps:
      - name: add_case_comment
        type: kibana.request
        with:
          method: POST
          path: "/api/cases/{{ steps.find_existing_case.output.cases.0.id }}/comments"
          body:
            type: user
            comment: >-
              Repeated squawk 7500 detected at {{ execution.startedAt }}.
              Position: {{ steps.fetch_squawk_event.output.hits.hits.0._source.latitude }},
              {{ steps.fetch_squawk_event.output.hits.hits.0._source.longitude }}
              | Altitude: {{ steps.fetch_squawk_event.output.hits.hits.0._source.baro_altitude }}m
              | Velocity: {{ steps.fetch_squawk_event.output.hits.hits.0._source.velocity }} m/s
              | On ground: {{ steps.fetch_squawk_event.output.hits.hits.0._source.on_ground }}
    else:
      - name: create_case
        type: kibana.createCase
        with:
          owner: securitySolution
          connector:
            id: "none"
            name: "none"
            type: ".none"
            fields: null
          settings:
            syncAlerts: true
          title: >-
            Squawk 7500 (Hijack) —
            {{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}
            ({{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }})
          description: |
            Automated investigation triggered by squawk 7500 detection.

            *Aircraft:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}
            *Callsign:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}
            *Origin country:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.origin_country }}
            *Position:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.latitude }}, {{ steps.fetch_squawk_event.output.hits.hits.0._source.longitude }}
            *Altitude:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.baro_altitude }}m
            *Velocity:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.velocity }} m/s
            *On ground:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.on_ground }}
            *Region:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.geo.NAME }}, {{ steps.fetch_squawk_event.output.hits.hits.0._source.geo.SUBREGION }}
          tags:
            - "squawk-7500"
            - "icao24:{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}"
            - "callsign:{{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}"
            - "auto-investigation"

  # ------------------------------------------------------------------
  # 4. Re-fetch the open case so we have its ID regardless of branch
  # ------------------------------------------------------------------
  - name: resolve_case
    type: kibana.request
    with:
      method: GET
      path: "/api/cases/_find?tags=icao24:{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}&tags=squawk-7500&status=open&perPage=1"

  # ------------------------------------------------------------------
  # 5. Enrich — 6-hour flight history for this aircraft
  # ------------------------------------------------------------------
  - name: flight_history
    type: elasticsearch.search
    with:
      index: "demos-aircraft-adsb"
      query:
        bool:
          filter:
            - term:
                icao24: "{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}"
            - range:
                "@timestamp":
                  gte: "{{ consts.historyWindow }}"
      size: 200
      sort:
        - "@timestamp"

  # ------------------------------------------------------------------
  # 6a. Correlate — adsbdb aircraft metadata + expected route
  # ------------------------------------------------------------------
  - name: adsbdb_lookup
    type: http
    with:
      url: "https://api.adsbdb.com/v0/aircraft/{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}?callsign={{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}"
      method: GET
    on-failure:
      continue: true

  # ------------------------------------------------------------------
  # 6b. Correlate — adsb.lol live position cross-reference
  # ------------------------------------------------------------------
  - name: adsblol_lookup
    type: http
    with:
      url: "https://api.adsb.lol/v2/icao/{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}"
      method: GET
    on-failure:
      continue: true

  # ------------------------------------------------------------------
  # 6c. Correlate — Reuters news search (optional, needs RAPIDAPI_KEY)
  # ------------------------------------------------------------------
  - name: reuters_search
    type: http
    with:
      url: "https://reuters-api.p.rapidapi.com/search?keywordName={{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}%20hijack&limit=5"
      method: GET
      headers:
        x-rapidapi-key: "__RAPIDAPI_KEY__"
        x-rapidapi-host: "reuters-api.p.rapidapi.com"
    on-failure:
      continue: true

  # ------------------------------------------------------------------
  # 7. AI assessment — invoke the hijack assessment agent
  # ------------------------------------------------------------------
  - name: ai_assessment
    type: ai.agent
    with:
      agent_id: "adsb_hijack_assessment_agent"
      message: |
        Assess whether this squawk 7500 signal is genuine or a false positive.
        All enrichment data is provided below — do NOT call the enrichment
        workflow tool; assess directly from this data.

        IMPORTANT: Begin your response with exactly one of these markers on
        its own line so the workflow can route your verdict:
          [GENUINE]
          [FALSE_POSITIVE]
        Then provide your confidence (0–1) and reasoning.

        === TRIGGERING EVENT ===
        ICAO24: {{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}
        Callsign: {{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}
        Origin country: {{ steps.fetch_squawk_event.output.hits.hits.0._source.origin_country }}
        Position: {{ steps.fetch_squawk_event.output.hits.hits.0._source.latitude }}, {{ steps.fetch_squawk_event.output.hits.hits.0._source.longitude }}
        Altitude: {{ steps.fetch_squawk_event.output.hits.hits.0._source.baro_altitude }}m barometric / {{ steps.fetch_squawk_event.output.hits.hits.0._source.geo_altitude }}m geometric
        Velocity: {{ steps.fetch_squawk_event.output.hits.hits.0._source.velocity }} m/s
        Heading: {{ steps.fetch_squawk_event.output.hits.hits.0._source.true_track }}°
        Vertical rate: {{ steps.fetch_squawk_event.output.hits.hits.0._source.vertical_rate }} m/s
        On ground: {{ steps.fetch_squawk_event.output.hits.hits.0._source.on_ground }}
        Nearest airport: {{ steps.fetch_squawk_event.output.hits.hits.0._source.airport.name }} ({{ steps.fetch_squawk_event.output.hits.hits.0._source.airport.iata_code }}, {{ steps.fetch_squawk_event.output.hits.hits.0._source.airport.activity }})
        Region: {{ steps.fetch_squawk_event.output.hits.hits.0._source.geo.NAME }}, {{ steps.fetch_squawk_event.output.hits.hits.0._source.geo.SUBREGION }} ({{ steps.fetch_squawk_event.output.hits.hits.0._source.geo.CONTINENT }})

        === FLIGHT HISTORY (last 6 hours, {{ steps.flight_history.output.hits.total.value }} data points) ===
        {{ steps.flight_history.output.hits.hits | json:2 }}

        === AIRCRAFT METADATA & EXPECTED ROUTE (adsbdb) ===
        {{ steps.adsbdb_lookup.output | json:2 }}

        === LIVE POSITION CROSS-REFERENCE (adsb.lol) ===
        {{ steps.adsblol_lookup.output | json:2 }}

        === NEWS SEARCH (Reuters — empty if API key not configured) ===
        {{ steps.reuters_search.output | json:2 }}

  # ------------------------------------------------------------------
  # 8. Update case with AI assessment and enrichment summary
  # ------------------------------------------------------------------
  - name: update_case_enrichment
    type: kibana.request
    with:
      method: POST
      path: "/api/cases/{{ steps.resolve_case.output.cases.0.id }}/comments"
      body:
        type: user
        comment: |
          ### AI Hijack Assessment

          {{ steps.ai_assessment.output.message }}

          ---

          **Data sources consulted:**
          - Flight history: {{ steps.flight_history.output.hits.total.value }} data points (last 6 hours)
          - Aircraft registry (adsbdb): {{ steps.adsbdb_lookup.output.response.aircraft.type | default: "unavailable" }} — {{ steps.adsbdb_lookup.output.response.aircraft.registered_owner | default: "unknown" }}
          - Expected route (adsbdb): {{ steps.adsbdb_lookup.output.response.flightroute.origin.iata_code | default: "?" }} → {{ steps.adsbdb_lookup.output.response.flightroute.destination.iata_code | default: "?" }}
          - Live tracking (adsb.lol): cross-referenced
          - News search (Reuters): consulted

  # ------------------------------------------------------------------
  # 9. Route — Slack alert for genuine, auto-close for false positive
  # ------------------------------------------------------------------
  - name: route_verdict
    type: if
    condition: "{{ steps.ai_assessment.output.message contains '[GENUINE]' }}"
    steps:
      - name: tag_genuine
        type: kibana.request
        with:
          method: PATCH
          path: "/api/cases"
          body:
            cases:
              - id: "{{ steps.resolve_case.output.cases.0.id }}"
                version: "{{ steps.resolve_case.output.cases.0.version }}"
                tags:
                  - "squawk-7500"
                  - "icao24:{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}"
                  - "callsign:{{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}"
                  - "auto-investigation"
                  - "verdict:genuine"
      - name: notify_slack
        type: slack
        connector-id: "d85ca362-fb82-56f6-867c-4ef2c356d912"
        with:
          message: |
            :rotating_light: *Squawk 7500 — Potential Hijack*
            _{{ execution.startedAt }}_

            *Aircraft:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }} ({{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }})
            *Origin:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.origin_country }}
            *Position:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.latitude }}, {{ steps.fetch_squawk_event.output.hits.hits.0._source.longitude }}
            *Altitude:* {{ steps.fetch_squawk_event.output.hits.hits.0._source.baro_altitude }}m

            {{ steps.ai_assessment.output.message }}

            :file_folder: <__KB_ENDPOINT__/app/security/cases/{{ steps.resolve_case.output.cases.0.id }}|Open Case>
        on-failure:
          continue: true
    else:
      - name: close_case
        type: kibana.request
        with:
          method: PATCH
          path: "/api/cases"
          body:
            cases:
              - id: "{{ steps.resolve_case.output.cases.0.id }}"
                version: "{{ steps.resolve_case.output.cases.0.version }}"
                status: "closed"
                tags:
                  - "squawk-7500"
                  - "icao24:{{ steps.fetch_squawk_event.output.hits.hits.0._source.icao24 }}"
                  - "callsign:{{ steps.fetch_squawk_event.output.hits.hits.0._source.callsign }}"
                  - "auto-investigation"
                  - "verdict:false_positive"
